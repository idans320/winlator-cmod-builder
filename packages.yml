mesa:
  description: Mesa Turnip Vulkan driver for Adreno/KGSL
  repo: https://github.com/whitebelyash/mesa-unified.git
  branch: turnip/gen8
  output: mesa-{version}.zip
  sdk_ver: 35

fexcore:
  description: FEXCore CPU emulation layer
  repo: https://github.com/FEX-Emu/FEX.git
  branch: main
  output: fexcore-{version}.wcp
  mingw_ver: "20260519"
  preset: elitex

wine:
  description: Wine 11 Proton ARM64 + ARM64EC
  repo: https://github.com/GameNative/proton-wine.git
  branch: proton_11.0
  output: wine-arm64-{version}.wcp
  mingw_ver: "20260519"
  sdk_ver: 28
  preset: elitex

box64:
  description: Box64 x86_64 emulator for ARM64
  repo: https://github.com/ptitSeb/box64.git
  branch: main
  output: box64-{version}.zip
  sdk_ver: 35

dxvk:
  description: DXVK GPLAsync-LowLatency — D3D8/9/10/11 Vulkan translation layer
  repo: https://github.com/Digger1955/dxvk-gplasync-lowlatency.git
  branch: GPLALL-master-2.7.1
  output: "{version}-arm64ec-gplasync.wcp"
  mingw_ver: "20260519"
  preset: elitex
